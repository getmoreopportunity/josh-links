<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joshua Collier — More Opportunity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:      #060d06;
    --bg-card:      #0d1a0d;
    --green-neon:   #39ff14;
    --green-mid:    #1db954;
    --green-dark:   #0e6b23;
    --text-primary: #f0f4f0;
    --text-muted:   #8fa68f;
    --border-glow:  rgba(57, 255, 20, 0.4);
    --radius:       12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 45% at 50% 0%, rgba(14, 107, 35, .30) 0%, transparent 70%),
      radial-gradient(ellipse 70% 35% at 15% 100%, rgba(57, 255, 20, .05) 0%, transparent 55%),
      radial-gradient(ellipse 45% 45% at 85% 40%, rgba(29, 185, 84, .07) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: .02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 32px 20px 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* ======== HERO PHOTO ======== */
  .hero-photo {
    width: 280px;
    max-width: 70%;
    margin-bottom: -8px;
    opacity: 0;
    transform: scale(0.95);
    animation: photo-in .8s ease forwards;
  }
  .hero-photo img {
    width: 100%;
    height: auto;
    display: block;
  }
  @keyframes photo-in {
    to { opacity: 1; transform: scale(1); }
  }

  /* ======== SIGNATURE ======== */
  .signature {
    width: 280px;
    max-width: 70%;
    margin-bottom: 2px;
    opacity: 0;
    animation: fade-up .5s ease .2s forwards;
  }
  .signature img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 12px rgba(57, 255, 20, .15));
  }

  /* ======== PROFILE TEXT ======== */
  .profile-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fade-up .5s ease .35s forwards;
  }

  .profile-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--green-neon);
    text-shadow: 0 0 20px rgba(57, 255, 20, .4);
  }

  .divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-neon), transparent);
    opacity: .35;
    margin: 6px 0;
  }

  .profile-sub {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    text-align: center;
    max-width: 320px;
    line-height: 1.55;
  }

  /* ======== GLOWING BUTTONS ======== */
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 16px 24px;
    border-radius: var(--radius);
    text-decoration: none;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: .3px;
    color: var(--text-primary);
    position: relative;
    cursor: pointer;
    transition: all .3s cubic-bezier(.25, .46, .45, .94);
    overflow: hidden;
    background: linear-gradient(135deg, rgba(13,26,13,.85), rgba(10,21,10,.95));
    border: 1px solid var(--border-glow);
    box-shadow:
      0 0 8px rgba(57,255,20,.12),
      0 0 20px rgba(57,255,20,.06),
      0 0 40px rgba(57,255,20,.03),
      inset 0 1px 0 rgba(57,255,20,.08);
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(57,255,20,0) 0%, rgba(57,255,20,.06) 50%, rgba(57,255,20,0) 100%);
    opacity: 0;
    transition: opacity .3s ease;
  }

  .link-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(57,255,20,.06) 40%, rgba(57,255,20,.14) 50%, rgba(57,255,20,.06) 60%, transparent 100%);
  }

  .link-btn:hover {
    border-color: rgba(57,255,20,.75);
    box-shadow:
      0 0 15px rgba(57,255,20,.25),
      0 0 35px rgba(57,255,20,.15),
      0 0 70px rgba(57,255,20,.07),
      0 0 100px rgba(57,255,20,.04),
      inset 0 1px 0 rgba(57,255,20,.15);
    color: #fff;
    transform: translateY(-2px);
  }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:hover::after { animation: scan .6s ease-out forwards; }
  @keyframes scan { to { left: 100%; } }

  .link-btn:active {
    transform: translateY(0);
    box-shadow: 0 0 12px rgba(57,255,20,.15), 0 0 25px rgba(57,255,20,.08), inset 0 1px 0 rgba(57,255,20,.1);
  }

  .link-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green-neon);
    background: rgba(57,255,20,.08);
    border: 1px solid rgba(57,255,20,.18);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 10px;
    flex-shrink: 0;
    text-shadow: 0 0 8px rgba(57,255,20,.3);
  }

  /* Staggered entrance */
  .link-btn { opacity: 0; transform: translateY(16px); animation: fade-up .5s ease forwards; }
  .links-wrap .link-btn:nth-child(1) { animation-delay: .15s; }
  .links-wrap .link-btn:nth-child(2) { animation-delay: .23s; }
  .links-wrap .link-btn:nth-child(3) { animation-delay: .31s; }
  .links-wrap .link-btn:nth-child(4) { animation-delay: .39s; }
  .links-wrap .link-btn:nth-child(5) { animation-delay: .47s; }
  .links-wrap .link-btn:nth-child(6) { animation-delay: .55s; }

  @keyframes fade-up {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ======== FOOTER ======== */
  .footer {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fade-up .5s ease .7s forwards;
  }
  .social-row { display: flex; gap: 14px; }
  .social-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(57,255,20,.2);
    background: rgba(13,26,13,.6);
    display: flex; align-items: center; justify-content: center;
    color: var(--green-mid);
    text-decoration: none;
    transition: all .25s ease;
    box-shadow: 0 0 8px rgba(57,255,20,.04);
  }
  .social-icon:hover {
    border-color: rgba(57,255,20,.6);
    box-shadow: 0 0 18px rgba(57,255,20,.18);
    color: var(--green-neon);
    transform: translateY(-2px);
  }
  .social-icon svg { width: 18px; height: 18px; fill: currentColor; }
  .footer-brand {
    font-size: 11px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--green-mid); opacity: .45;
    text-decoration: none;
    transition: opacity .25s ease;
  }
  .footer-brand:hover {
    opacity: .8;
    color: var(--green-neon);
  }

  @media (max-width: 480px) {
    .container { padding: 24px 16px 56px; }
    .hero-photo { width: 240px; }
    .signature { width: 240px; }
    .link-btn { padding: 14px 18px; font-size: 14px; }
  }
</style>
</head>
